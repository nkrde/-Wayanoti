<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, -apple-system, sans-serif">

  <defs>

    <!-- Background base -->
    <radialGradient id="bg-glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%"   stop-color="#1a0f2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#070710" stop-opacity="1"/>
    </radialGradient>

    <!-- Logo ring gradient: teal → purple → orange -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00e5cc"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Logo inner circle gradient -->
    <radialGradient id="logo-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e1535"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>

    <!-- Logo glow halo behind circle -->
    <radialGradient id="logo-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6c3fc5" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#3b1d7a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Search bar border gradient: blue-left → pink-right -->
    <linearGradient id="search-border" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#5b5bff"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>

    <!-- Submit button gradient -->
    <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Dot grid pattern (subtle) -->
    <pattern id="dot-grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>

    <!-- Clip for logo circle -->
    <clipPath id="logo-clip">
      <circle cx="720" cy="285" r="44"/>
    </clipPath>

    <!-- Preset pill filter -->
    <filter id="pill-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ══════════════════════════════════════════
       BACKGROUND
  ══════════════════════════════════════════ -->

  <!-- Base black -->
  <rect width="1440" height="900" fill="#09090f"/>

  <!-- Radial purple glow center -->
  <rect width="1440" height="900" fill="url(#bg-glow)"/>

  <!-- Dot grid overlay -->
  <rect width="1440" height="900" fill="url(#dot-grid)"/>

  <!-- Subtle purple bloom behind logo area -->
  <ellipse cx="720" cy="310" rx="320" ry="220" fill="#5b21b6" fill-opacity="0.13"/>
  <ellipse cx="720" cy="310" rx="160" ry="120" fill="#7c3aed" fill-opacity="0.1"/>


  <!-- ══════════════════════════════════════════
       TOP NAV
  ══════════════════════════════════════════ -->

  <!-- Left toggle button -->
  <rect x="14" y="12" width="32" height="32" rx="8" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="1"/>
  <!-- chevron right icon -->
  <polyline points="24,21 30,28 24,35" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center nav pill -->
  <rect x="648" y="10" width="208" height="38" rx="19" fill="#111122" stroke="#2a2a42" stroke-width="1"/>

  <!-- Home tab (active) -->
  <rect x="651" y="13" width="90" height="32" rx="16" fill="#1e1e35"/>
  <!-- Home icon -->
  <path d="M674 27 L679 22 L684 27 L684 33 L681 33 L681 30 L677 30 L677 33 L674 33 Z" fill="none" stroke="#e2e8f0" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="689" y="33" font-size="12" fill="#e2e8f0" font-weight="500">Home</text>

  <!-- New Chat button -->
  <rect x="748" y="13" width="103" height="32" rx="16" fill="transparent"/>
  <!-- Plus icon -->
  <line x1="764" y1="29" x2="774" y2="29" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="769" y1="24" x2="769" y2="34" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round"/>
  <text x="779" y="33" font-size="12" fill="#94a3b8" font-weight="500">New Chat</text>

  <!-- Right nav: help icon -->
  <circle cx="1380" cy="29" r="13" fill="#111122" stroke="#2a2a42" stroke-width="1"/>
  <text x="1380" y="34" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">?</text>

  <!-- Portfolio value chip -->
  <rect x="1396" y="14" width="120" height="30" rx="8" fill="#111122" stroke="#2a2a42" stroke-width="1"/>
  <!-- Wallet icon tiny -->
  <rect x="1406" y="20" width="12" height="9" rx="1.5" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <rect x="1412" y="22" width="4" height="5" rx="1" fill="#94a3b8"/>
  <text x="1424" y="32" font-size="12" fill="#f1f5f9" font-weight="600">₹1,14,634</text>
  <!-- Green percentage badge -->
  <rect x="1458" y="18" width="52" height="18" rx="4" fill="#052e16"/>
  <text x="1484" y="31" font-size="10" fill="#22c55e" font-weight="700" text-anchor="middle">▲ 2.1%</text>


  <!-- ══════════════════════════════════════════
       LOGO + HERO
  ══════════════════════════════════════════ -->

  <!-- Halo glow behind logo -->
  <ellipse cx="720" cy="285" rx="90" ry="90" fill="url(#logo-halo)"/>

  <!-- Ring (gradient stroke, thick) -->
  <circle cx="720" cy="285" r="50" fill="none" stroke="url(#ring-grad)" stroke-width="3.5"/>

  <!-- Inner circle -->
  <circle cx="720" cy="285" r="46" fill="url(#logo-inner)"/>

  <!-- WayaX W-arrow logomark -->
  <!-- Left wing -->
  <polygon points="703,298 711,270 720,283" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Right wing -->
  <polygon points="737,298 729,270 720,283" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Center notch -->
  <polygon points="716,298 720,283 724,298 720,293" fill="#ffffff" fill-opacity="0.95"/>


  <!-- ══════════════════════════════════════════
       HEADLINE
  ══════════════════════════════════════════ -->

  <!-- "Welcome to WayaX," in white -->
  <text x="720" y="375" font-size="46" fill="#ffffff" font-weight="800" text-anchor="middle" letter-spacing="-0.5">
    Welcome to WayaX,
  </text>

  <!-- "Bumble Bee" — blue → purple gradient text effect using two overlapping texts -->
  <defs>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <mask id="name-mask">
      <text x="720" y="375" font-size="46" font-weight="800" text-anchor="middle" letter-spacing="-0.5" fill="white">
        <tspan dx="0" dy="0">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Bumble Bee</tspan>
      </text>
    </mask>
  </defs>

  <!-- Full headline row -->
  <text font-size="46" fill="#ffffff" font-weight="800" text-anchor="middle" letter-spacing="-0.5">
    <tspan x="720" y="375">Welcome to WayaX, </tspan>
  </text>
  <!-- Bumble Bee coloured separately -->
  <text font-size="46" font-weight="800" text-anchor="middle" letter-spacing="-0.5">
    <tspan x="720" y="427" fill="url(#name-grad)">Bumble Bee</tspan>
  </text>

  <!-- Re-draw the white part (Welcome to WayaX,) to avoid double -->
  <!-- FULL LINE as single text, split via tspan -->
  <!-- Actually render as two lines: -->
  <!-- Line 1 -->
  <text x="720" y="378" font-size="46" fill="#ffffff" font-weight="800" text-anchor="middle" letter-spacing="-0.5">Welcome to WayaX, <tspan fill="url(#name-grad)">Bumble Bee</tspan></text>


  <!-- ══════════════════════════════════════════
       SEARCH BAR
  ══════════════════════════════════════════ -->

  <!-- Outer glow border (gradient stroke simulation via rect behind) -->
  <rect x="377" y="414" width="810" height="54" rx="27" fill="url(#search-border)" fill-opacity="1"/>
  <!-- Inner fill (slightly inset) -->
  <rect x="378.5" y="415.5" width="807" height="51" rx="26" fill="#0f0f1e"/>

  <!-- Placeholder text -->
  <text x="406" y="446" font-size="14" fill="#4a5568" font-weight="400">Which stocks can I short sell right now?</text>

  <!-- Mic icon -->
  <g transform="translate(1100, 428)">
    <!-- mic body -->
    <rect x="-5" y="-10" width="10" height="14" rx="5" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <!-- mic stand arc -->
    <path d="M-9 5 Q-9 12 0 12 Q9 12 9 5" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <!-- stand line -->
    <line x1="0" y1="12" x2="0" y2="16" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Submit button (gradient square pill) -->
  <rect x="1140" y="418" width="38" height="38" rx="18" fill="url(#btn-grad)"/>
  <!-- Arrow up icon in button -->
  <g transform="translate(1159, 437)">
    <line x1="0" y1="7" x2="0" y2="-6" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <polyline points="-5,0 0,-6 5,0" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>


  <!-- ══════════════════════════════════════════
       EXPLORE CHAT PRESETS LABEL
  ══════════════════════════════════════════ -->

  <!-- Left line -->
  <line x1="377" y1="502" x2="617" y2="502" stroke="#2a2a42" stroke-width="1"/>
  <!-- Label -->
  <text x="720" y="507" font-size="10.5" fill="#4a5568" text-anchor="middle" font-weight="600" letter-spacing="2.5">EXPLORE CHAT PRESETS</text>
  <!-- Right line -->
  <line x1="823" y1="502" x2="1063" y2="502" stroke="#2a2a42" stroke-width="1"/>


  <!-- ══════════════════════════════════════════
       PRESET PILLS
  ══════════════════════════════════════════ -->

  <!-- Pill 1: Stocks to Buy -->
  <rect x="446" y="515" width="130" height="34" rx="17" fill="#111122" stroke="#2d2d4a" stroke-width="1"/>
  <!-- Trend up icon -->
  <polyline points="460,535 467,527 473,531 480,523" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="489" y="537" font-size="12" fill="#cbd5e1" font-weight="500">Stocks to Buy</text>
  <!-- Chevron -->
  <polyline points="561,529 565,533 561,537" fill="none" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pill 2: Short selling -->
  <rect x="587" y="515" width="122" height="34" rx="17" fill="#111122" stroke="#2d2d4a" stroke-width="1"/>
  <!-- Warning triangle icon -->
  <polygon points="601,535 608,523 615,535" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-linejoin="round"/>
  <text x="601" y="531" font-size="9" fill="#94a3b8" text-anchor="middle">!</text>
  <text x="623" y="537" font-size="12" fill="#cbd5e1" font-weight="500">Short selling</text>
  <polyline points="693,529 697,533 693,537" fill="none" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pill 3: Long term picks -->
  <rect x="720" y="515" width="145" height="34" rx="17" fill="#111122" stroke="#2d2d4a" stroke-width="1"/>
  <!-- Sparkle/star icon -->
  <circle cx="735" cy="532" r="2" fill="#94a3b8"/>
  <line x1="735" y1="526" x2="735" y2="528" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="735" y1="536" x2="735" y2="538" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="729" y1="532" x2="731" y2="532" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="739" y1="532" x2="741" y2="532" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
  <text x="748" y="537" font-size="12" fill="#cbd5e1" font-weight="500">Long term picks</text>
  <polyline points="847,529 851,533 847,537" fill="none" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pill 4: Track record -->
  <rect x="876" y="515" width="128" height="34" rx="17" fill="#111122" stroke="#2d2d4a" stroke-width="1"/>
  <!-- Search icon -->
  <circle cx="891" cy="531" r="5" fill="none" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="894.5" y1="534.5" x2="898" y2="538" stroke="#94a3b8" stroke-width="1.3" stroke-linecap="round"/>
  <text x="904" y="537" font-size="12" fill="#cbd5e1" font-weight="500">Track record</text>
  <polyline points="984,529 988,533 984,537" fill="none" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pill 5: About Waya -->
  <rect x="1015" y="515" width="118" height="34" rx="17" fill="#111122" stroke="#2d2d4a" stroke-width="1"/>
  <!-- WayaX mini logo circle -->
  <circle cx="1030" cy="532" r="6" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
  <polygon points="1027,535 1030,526 1033,535 1030,532" fill="#94a3b8" fill-opacity="0.8"/>
  <text x="1042" y="537" font-size="12" fill="#cbd5e1" font-weight="500">About Waya</text>
  <polyline points="1117,529 1121,533 1117,537" fill="none" stroke="#4a5568" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>


  <!-- ══════════════════════════════════════════
       BOTTOM LEFT CONTROLS
  ══════════════════════════════════════════ -->

  <!-- Refresh left button -->
  <rect x="14" y="845" width="32" height="32" rx="8" fill="#111122" stroke="#2a2a42" stroke-width="1"/>
  <!-- CCW arrow -->
  <path d="M24 856 A7 7 0 1 0 31 863" fill="none" stroke="#64748b" stroke-width="1.4" stroke-linecap="round"/>
  <polyline points="31,858 31,863 36,863" fill="none" stroke="#64748b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Refresh right button -->
  <rect x="52" y="845" width="32" height="32" rx="8" fill="#111122" stroke="#2a2a42" stroke-width="1"/>
  <!-- CW arrow -->
  <path d="M68 856 A7 7 0 1 1 61 863" fill="none" stroke="#64748b" stroke-width="1.4" stroke-linecap="round"/>
  <polyline points="61,858 61,863 56,863" fill="none" stroke="#64748b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>


  <!-- ══════════════════════════════════════════
       BOTTOM SEBI BADGE
  ══════════════════════════════════════════ -->

  <rect x="556" y="828" width="430" height="54" rx="12" fill="#0f0f1e" stroke="#1e2235" stroke-width="1"/>

  <!-- Green dot -->
  <circle cx="576" cy="844" r="4" fill="#22c55e"/>

  <!-- SEBI line 1 -->
  <text x="588" y="848" font-size="10.5" fill="#e2e8f0" font-weight="700" letter-spacing="1.5">SEBI REGISTERED ANALYST · RA INH000010876</text>

  <!-- Disclaimer line -->
  <text x="720" y="868" font-size="10" fill="#4a5568" text-anchor="middle">Investments are subject to market risk. Past performance is not indicative of future results.</text>

</svg>
