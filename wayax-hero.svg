<svg xmlns="http://www.w3.org/2000/svg" width="1071" height="313" viewBox="0 0 1071 313">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#060914"/>
    <stop offset="100%" stop-color="#02040a"/>
  </linearGradient>
  <linearGradient id="king" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6d5cff"/>
    <stop offset="100%" stop-color="#d45cff"/>
  </linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4c4cff"/>
    <stop offset="100%" stop-color="#c45cff"/>
  </linearGradient>
</defs>

<rect width="1071" height="313" fill="url(#bg)"/>

<!-- title -->
<text x="535.5" y="55" text-anchor="middle"
      font-family="Inter, Arial, sans-serif"
      font-size="48" font-weight="800" fill="#f1f3f8">
  Welcome to Waya
</text>

<!-- prompt box -->
<rect x="34" y="91" width="1006" height="61" rx="28"
      fill="#0d1020" stroke="url(#border)" stroke-width="2"/>

<text x="52" y="129" font-family="Inter, Arial, sans-serif"
      font-size="16" fill="#7f8699">Ask W</text>

<rect x="945" y="107" width="34" height="33" rx="8" fill="#1b2030" stroke="#31364a"/>
<text x="962" y="129" text-anchor="middle" font-size="16" fill="#cfd3dd">◐</text>

<rect x="986" y="107" width="34" height="33" rx="8" fill="#2a2550"/>
<text x="1003" y="128" text-anchor="middle" font-size="16" fill="#cfd3dd">↑</text>

<!-- divider -->
<line x1="425" y1="185" x2="458" y2="185" stroke="#30374a"/>
<line x1="613" y1="185" x2="646" y2="185" stroke="#30374a"/>
<text x="535" y="189" text-anchor="middle"
      font-family="Inter, Arial, sans-serif"
      font-size="10" letter-spacing="3" fill="#9aa0b0">
  EXPLORE CHAT PRESETS
</text>

<!-- pills -->
<g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#d5d8e1">
  <rect x="121" y="226" width="162" height="37" rx="18" fill="#121722" stroke="#2d3342"/>
  <text x="160" y="249">↗ Stocks to Buy</text>

  <rect x="291" y="226" width="154" height="37" rx="18" fill="#121722" stroke="#2d3342"/>
  <text x="307" y="249">⚠ Short selling</text>

  <rect x="455" y="226" width="170" height="37" rx="18" fill="#121722" stroke="#2d3342"/>
  <text x="470" y="249">✣ Long term picks</text>

  <rect x="639" y="226" width="154" height="37" rx="18" fill="#121722" stroke="#2d3342"/>
  <text x="654" y="249">⌕ Track record</text>

  <rect x="804" y="226" width="150" height="37" rx="18" fill="#121722" stroke="#2d3342"/>
  <text x="816" y="249">◕ About Waya</text>
</g>
</svg>